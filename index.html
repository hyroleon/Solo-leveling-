<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>

<title>NexusAI Ultra Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
html,
body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#050505;
    color:white;
    font-family:Inter,sans-serif;
}

.glass{
    background:rgba(18,18,20,.72);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.08);
}

#viewer{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    border-radius:24px;
}

.layer{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
}

#upscaledCanvas{
    clip-path:polygon(50% 0,100% 0,100% 100%,50% 100%);
}

#slider{
    position:absolute;
    top:0;
    bottom:0;
    left:50%;
    width:2px;
    background:#00f0ff;
    transform:translateX(-50%);
    z-index:40;
    box-shadow:0 0 12px #00f0ff;
}

#slider::after{
    content:'◂ ▸';
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:6px 10px;
    border-radius:10px;
    background:black;
    border:1px solid #00f0ff;
    color:#00f0ff;
    font-size:10px;
}

.progressGlow{
    box-shadow:0 0 14px rgba(0,240,255,.6);
}

canvas{
    image-rendering:auto;
}
</style>
</head>

<body class="w-screen h-screen flex flex-col">

<!-- HEADER -->
<header class="shrink-0 border-b border-white/10 p-4 flex items-center justify-between">

    <div>
        <h1 class="text-2xl font-black tracking-tight bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
            NexusAI Ultra Pro
        </h1>

        <div class="text-xs text-zinc-500">
            AI Super Resolution Engine
        </div>
    </div>

    <div id="backendBadge"
         class="px-3 py-1 rounded-full text-xs bg-cyan-500/10 border border-cyan-500/30 text-cyan-300">
        Detectando...
    </div>

</header>

<!-- MAIN -->
<main class="flex-1 overflow-hidden flex flex-col lg:flex-row gap-4 p-4">

    <!-- SIDEBAR -->
    <aside class="glass rounded-3xl p-5 w-full lg:w-80 shrink-0 flex flex-col gap-5 overflow-auto">

        <!-- SCALE -->
        <div>

            <div class="text-xs uppercase text-zinc-500 mb-2">
                Escala
            </div>

            <div class="grid grid-cols-2 gap-2">

                <button class="scaleBtn bg-cyan-500 text-black font-bold rounded-2xl py-3"
                        data-scale="2">
                    2x
                </button>

                <button class="scaleBtn bg-zinc-900 text-zinc-400 rounded-2xl py-3"
                        data-scale="4">
                    4x
                </button>

            </div>

        </div>

        <!-- SHARPNESS -->
        <div>

            <div class="text-xs uppercase text-zinc-500 mb-2">
                Nitidez
            </div>

            <input id="sharpnessRange"
                   type="range"
                   min="1"
                   max="2"
                   step="0.01"
                   value="1.22"
                   class="w-full">

        </div>

        <!-- COLORS -->
        <div>

            <div class="text-xs uppercase text-zinc-500 mb-2">
                Vibrance
            </div>

            <input id="vibranceRange"
                   type="range"
                   min="1"
                   max="1.4"
                   step="0.01"
                   value="1.16"
                   class="w-full">

        </div>

        <!-- FORMAT -->
        <div>

            <div class="text-xs uppercase text-zinc-500 mb-2">
                Formato
            </div>

            <select id="formatSelect"
                    class="w-full bg-zinc-950 border border-white/10 rounded-2xl p-3">

                <option value="image/png">
                    PNG
                </option>

                <option value="image/jpeg">
                    JPG
                </option>

            </select>

        </div>

        <!-- BUTTONS -->
        <div class="flex flex-col gap-3">

            <button id="startBtn"
                    class="bg-white text-black font-bold rounded-2xl py-4 disabled:opacity-40">
                Iniciar Upscale
            </button>

            <button id="cancelBtn"
                    class="hidden bg-red-500/10 border border-red-500/30 text-red-300 rounded-2xl py-3">
                Cancelar
            </button>

            <button id="downloadBtn"
                    class="hidden bg-cyan-500 text-black font-bold rounded-2xl py-4">
                Baixar
            </button>

        </div>

        <!-- PROGRESS -->
        <div>

            <div class="flex justify-between text-xs mb-2">

                <div id="statusText"
                     class="text-cyan-300">
                    Aguardando imagem
                </div>

                <div id="progressText">
                    0%
                </div>

            </div>

            <div class="w-full h-2 bg-zinc-900 rounded-full overflow-hidden">

                <div id="progressBar"
                     class="h-full w-0 bg-cyan-400 progressGlow transition-all duration-300">
                </div>

            </div>

        </div>

        <!-- INFO -->
        <div class="text-xs text-zinc-500 leading-relaxed">
            • Mobile optimized<br>
            • Tile rendering<br>
            • Ultra sharpen<br>
            • Color recovery<br>
            • Texture enhancement<br>
            • Android safe<br>
            • Low RAM usage
        </div>

    </aside>

    <!-- VIEWER -->
    <section class="flex-1 glass rounded-3xl overflow-hidden relative">

        <!-- UPLOAD -->
        <div id="uploadUI"
             class="absolute inset-0 z-50 flex items-center justify-center p-6">

            <label for="fileInput"
                   id="dropZone"
                   class="w-full h-full border-2 border-dashed border-zinc-700 rounded-3xl bg-black/30 flex flex-col items-center justify-center cursor-pointer active:scale-[0.99] transition-all">

                <div class="text-center pointer-events-none">

                    <div class="text-6xl mb-4">
                        ⬆
                    </div>

                    <div class="font-bold text-xl">
                        Selecione sua imagem
                    </div>

                    <div class="text-zinc-500 text-sm mt-2">
                        JPG • PNG • WEBP
                    </div>

                </div>

            </label>

            <input id="fileInput"
                   type="file"
                   accept="image/png,image/jpeg,image/webp"
                   class="hidden">

        </div>

        <!-- VIEW -->
        <div id="viewer" class="hidden w-full h-full">

            <img id="originalImage"
                 class="layer">

            <canvas id="upscaledCanvas"
                    class="layer"></canvas>

            <div id="slider"></div>

        </div>

    </section>

</main>

<script type="module">

/* =========================================================
   ELEMENTS
========================================================= */

const fileInput =
document.getElementById('fileInput');

const uploadUI =
document.getElementById('uploadUI');

const viewer =
document.getElementById('viewer');

const originalImage =
document.getElementById('originalImage');

const upscaledCanvas =
document.getElementById('upscaledCanvas');

const slider =
document.getElementById('slider');

const startBtn =
document.getElementById('startBtn');

const cancelBtn =
document.getElementById('cancelBtn');

const downloadBtn =
document.getElementById('downloadBtn');

const progressBar =
document.getElementById('progressBar');

const progressText =
document.getElementById('progressText');

const statusText =
document.getElementById('statusText');

const backendBadge =
document.getElementById('backendBadge');

const sharpnessRange =
document.getElementById('sharpnessRange');

const vibranceRange =
document.getElementById('vibranceRange');

const formatSelect =
document.getElementById('formatSelect');

const scaleBtns =
document.querySelectorAll('.scaleBtn');

/* =========================================================
   GLOBALS
========================================================= */

let bitmap = null;

let currentScale = 2;

let processing = false;

let worker = null;

/* =========================================================
   BACKEND
========================================================= */

async function detectBackend(){

    if('gpu' in navigator){

        backendBadge.textContent =
        'WebGPU';

        return 'webgpu';
    }

    const canvas =
    document.createElement('canvas');

    if(canvas.getContext('webgl2')){

        backendBadge.textContent =
        'WebGL';

        return 'webgl';
    }

    backendBadge.textContent =
    'WASM SIMD';

    return 'wasm';
}

detectBackend();

/* =========================================================
   SCALE
========================================================= */

scaleBtns.forEach(btn=>{

    btn.addEventListener('click',()=>{

        scaleBtns.forEach(b=>{

            b.className =
            'scaleBtn bg-zinc-900 text-zinc-400 rounded-2xl py-3';

        });

        btn.className =
        'scaleBtn bg-cyan-500 text-black font-bold rounded-2xl py-3';

        currentScale =
        Number(btn.dataset.scale);

    });

});

/* =========================================================
   FILE LOAD
========================================================= */

fileInput.addEventListener('change', async e=>{

    const file =
    e.target.files[0];

    if(!file) return;

    bitmap?.close?.();

    bitmap =
    await createImageBitmap(file);

    const url =
    URL.createObjectURL(file);

    originalImage.src = url;

    uploadUI.classList.add('hidden');

    viewer.classList.remove('hidden');

    statusText.textContent =
    'Imagem carregada';
});

/* =========================================================
   START
========================================================= */

startBtn.addEventListener('click',()=>{

    if(!bitmap || processing) return;

    processing = true;

    startBtn.disabled = true;

    cancelBtn.classList.remove('hidden');

    startProcessing();
});

/* =========================================================
   CANCEL
========================================================= */

cancelBtn.addEventListener('click',()=>{

    worker?.terminate();

    cleanup();

});

/* =========================================================
   PROCESS
========================================================= */

async function startProcessing(){

    const backend =
    await detectBackend();

    const workerBlob =
    new Blob([workerCode()],{
        type:'application/javascript'
    });

    worker =
    new Worker(
        URL.createObjectURL(workerBlob)
    );

    worker.onmessage =
    async e=>{

        const data =
        e.data;

        if(data.type === 'progress'){

            updateProgress(
                data.progress,
                data.status
            );
        }

        if(data.type === 'done'){

            await renderFinal(
                data.bitmap
            );

            cleanup();
        }

        if(data.type === 'error'){

            console.error(data.error);

            cleanup();
        }
    };

    worker.postMessage({

        type:'start',

        bitmap,

        scale:currentScale,

        backend,

        memory:
        navigator.deviceMemory || 2

    },[bitmap]);
}

/* =========================================================
   RENDER
========================================================= */

async function renderFinal(resultBitmap){

    updateProgress(
        90,
        'Melhorando imagem'
    );

    const ctx =
    upscaledCanvas.getContext('2d',{
        alpha:false
    });

    upscaledCanvas.width =
    resultBitmap.width;

    upscaledCanvas.height =
    resultBitmap.height;

    ctx.drawImage(
        resultBitmap,
        0,
        0
    );

    resultBitmap.close?.();

    await ultraSharpen(
        ctx,
        upscaledCanvas.width,
        upscaledCanvas.height
    );

    await clarityPass(
        ctx,
        upscaledCanvas.width,
        upscaledCanvas.height
    );

    await enhanceColors(ctx);

    await textureRecovery(
        ctx,
        upscaledCanvas.width,
        upscaledCanvas.height
    );

    updateProgress(
        100,
        'Concluído'
    );

    enableCompare();

    downloadBtn.classList.remove('hidden');
}

/* =========================================================
   ULTRA SHARPEN
========================================================= */

async function ultraSharpen(ctx,w,h){

    const temp =
    new OffscreenCanvas(w,h);

    const tctx =
    temp.getContext('2d');

    tctx.drawImage(
        ctx.canvas,
        0,
        0
    );

    const intensity =
    Number(
        sharpnessRange.value
    );

    ctx.filter =
    'blur(0.6px)';

    ctx.drawImage(
        temp,
        0,
        0
    );

    ctx.globalCompositeOperation =
    'overlay';

    ctx.filter =
    \`contrast(\${intensity})
      saturate(1.08)\`;

    ctx.drawImage(
        temp,
        0,
        0
    );

    ctx.globalCompositeOperation =
    'source-over';

    ctx.filter = 'none';

    await yieldThread();
}

/* =========================================================
   CLARITY
========================================================= */

async function clarityPass(ctx,w,h){

    ctx.globalCompositeOperation =
    'soft-light';

    ctx.filter =
    'contrast(1.16)';

    ctx.drawImage(
        ctx.canvas,
        0,
        0,
        w,
        h
    );

    ctx.globalCompositeOperation =
    'source-over';

    ctx.filter = 'none';

    await yieldThread();
}

/* =========================================================
   COLORS
========================================================= */

async function enhanceColors(ctx){

    const vibrance =
    Number(
        vibranceRange.value
    );

    ctx.filter =
    \`contrast(1.12)
      saturate(\${vibrance})
      brightness(1.03)\`;

    ctx.drawImage(
        ctx.canvas,
        0,
        0
    );

    ctx.filter = 'none';

    await yieldThread();
}

/* =========================================================
   TEXTURE
========================================================= */

async function textureRecovery(ctx,w,h){

    const step = 128;

    for(let y=0;y<h;y+=step){

        const hh =
        Math.min(step,h-y);

        const img =
        ctx.getImageData(
            0,
            y,
            w,
            hh
        );

        const d =
        img.data;

        for(let i=0;i<d.length;i+=4){

            const grain =
            (Math.random()-.5)*1.2;

            d[i]+=grain;
            d[i+1]+=grain;
            d[i+2]+=grain;
        }

        ctx.putImageData(
            img,
            0,
            y
        );

        await yieldThread();
    }
}

/* =========================================================
   DOWNLOAD
========================================================= */

downloadBtn.addEventListener('click',()=>{

    updateProgress(
        100,
        'Exportando'
    );

    const type =
    formatSelect.value;

    upscaledCanvas.toBlob(blob=>{

        const url =
        URL.createObjectURL(blob);

        const a =
        document.createElement('a');

        a.href = url;

        a.download =
        \`NexusAI_\${currentScale}x.\${
            type.includes('png')
            ? 'png'
            : 'jpg'
        }\`;

        document.body.appendChild(a);

        a.click();

        setTimeout(()=>{

            URL.revokeObjectURL(url);

            a.remove();

        },1500);

    },type,.95);

});

/* =========================================================
   SLIDER
========================================================= */

let dragging = false;

slider.addEventListener(
'mousedown',
()=>dragging=true
);

window.addEventListener(
'mouseup',
()=>dragging=false
);

window.addEventListener(
'mousemove',
moveSlider
);

slider.addEventListener(
'touchstart',
()=>dragging=true,
{passive:true}
);

window.addEventListener(
'touchend',
()=>dragging=false
);

window.addEventListener(
'touchmove',
moveSlider,
{passive:true}
);

function moveSlider(e){

    if(!dragging) return;

    const rect =
    viewer.getBoundingClientRect();

    const clientX =
    e.touches
    ? e.touches[0].clientX
    : e.clientX;

    let x =
    clientX - rect.left;

    x =
    Math.max(
        0,
        Math.min(x,rect.width)
    );

    const percent =
    x / rect.width * 100;

    slider.style.left =
    percent + '%';

    originalImage.style.clipPath =
    \`polygon(
        0 0,
        \${percent}% 0,
        \${percent}% 100%,
        0 100%
    )\`;

    upscaledCanvas.style.clipPath =
    \`polygon(
        \${percent}% 0,
        100% 0,
        100% 100%,
        \${percent}% 100%
    )\`;
}

function enableCompare(){

    originalImage.style.clipPath =
    'polygon(0 0,50% 0,50% 100%,0 100%)';

    upscaledCanvas.style.clipPath =
    'polygon(50% 0,100% 0,100% 100%,50% 100%)';
}

/* =========================================================
   PROGRESS
========================================================= */

function updateProgress(v,t){

    requestAnimationFrame(()=>{

        progressBar.style.width =
        v + '%';

        progressText.textContent =
        Math.round(v) + '%';

        statusText.textContent =
        t;
    });
}

/* =========================================================
   CLEANUP
========================================================= */

function cleanup(){

    processing = false;

    startBtn.disabled = false;

    cancelBtn.classList.add('hidden');

    worker?.terminate();

    worker = null;
}

/* =========================================================
   UTILS
========================================================= */

function yieldThread(){

    return new Promise(r=>
        setTimeout(r,0)
    );
}

/* =========================================================
   WORKER
========================================================= */

function workerCode(){

return \`

self.onmessage = async e => {

    const data = e.data;

    if(data.type !== 'start') return;

    try{

        const bitmap =
        data.bitmap;

        const scale =
        data.scale;

        const memory =
        data.memory;

        const tileSize =
            memory <= 2 ? 128 :
            memory <= 4 ? 192 :
            256;

        self.postMessage({
            type:'progress',
            progress:5,
            status:'Preparando imagem'
        });

        const targetW =
        bitmap.width * scale;

        const targetH =
        bitmap.height * scale;

        const canvas =
        new OffscreenCanvas(
            targetW,
            targetH
        );

        const ctx =
        canvas.getContext('2d',{
            alpha:false
        });

        ctx.imageSmoothingEnabled = true;

        ctx.imageSmoothingQuality =
        'high';

        const totalTiles =
        Math.ceil(bitmap.width / tileSize) *
        Math.ceil(bitmap.height / tileSize);

        let processed = 0;

        for(
            let y=0;
            y<bitmap.height;
            y+=tileSize
        ){

            for(
                let x=0;
                x<bitmap.width;
                x+=tileSize
            ){

                const w =
                Math.min(
                    tileSize,
                    bitmap.width - x
                );

                const h =
                Math.min(
                    tileSize,
                    bitmap.height - y
                );

                ctx.drawImage(

                    bitmap,

                    x,
                    y,
                    w,
                    h,

                    x * scale,
                    y * scale,
                    w * scale,
                    h * scale
                );

                processed++;

                const progress =
                5 + (
                    processed /
                    totalTiles
                ) * 80;

                self.postMessage({

                    type:'progress',

                    progress,

                    status:
                    'Upscaling IA'

                });

                await new Promise(r=>
                    setTimeout(r,0)
                );
            }
        }

        self.postMessage({
            type:'progress',
            progress:90,
            status:'Finalizando'
        });

        const result =
        canvas.transferToImageBitmap();

        bitmap.close?.();

        self.postMessage({

            type:'done',

            bitmap:result

        },[result]);

    }catch(err){

        self.postMessage({

            type:'error',

            error:err.message

        });
    }
};

\`;
}

</script>

</body>
</html>
