<!DOCTYPE html>        
<html lang="pt-br">        
<head>        
    <meta charset="UTF-8">        
    <meta name="viewport" content="width=device-width, initial-scale=1.0">        
    <title>SHADOW SYSTEM | Core v34.0 Audio Update</title>        
    <style>        
        :root { --bg: #050505; --p: #0d0d0d; --a: #00f2ff; --t: #e0e0e0; --b: #1a1a1a; --shadow: #6a00ff; --danger: #ff4444; }        
        * { box-sizing: border-box; font-family: 'Courier New', monospace; }        
        body { background: var(--bg); color: var(--t); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }        
        .container { width: 100%; max-width: 500px; }        
                
        .panel { background: var(--p); border: 1px solid var(--b); padding: 15px; margin-bottom: 10px; position: relative; }        
        .day-counter { position: absolute; top: 10px; right: 10px; font-size: 10px; color: var(--a); border: 1px solid var(--a); padding: 2px 6px; }        
                
        .header-status { text-align: center; padding-top: 20px; }
        .avatar-container { width: 90px; height: 90px; margin: 0 auto 10px; border: 2px solid var(--a); border-radius: 50%; overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #000; box-shadow: 0 0 15px rgba(0,242,255,0.2); }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; }
        #file-input { display: none; }

        .lvl { font-size: 80px; font-weight: bold; color: var(--a); margin: 5px 0; line-height: 1; text-shadow: 0 0 10px rgba(0,242,255,0.3); }        
        .rank-ui { font-size: 11px; color: var(--a); font-weight: bold; letter-spacing: 2px; }        
        .xp-w { width: 100%; height: 6px; background: #111; margin: 15px 0; border-radius: 3px; overflow: hidden; }        
        .xp-f { height: 100%; background: var(--a); width: 0%; transition: 0.6s ease-out; }        
        
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }        
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }        
                
        .attr-card { background: #000; border: 1px solid #1a1a1a; padding: 10px; display: flex; justify-content: space-between; align-items: center; }        
        .attr-v { color: var(--a); font-weight: bold; background: transparent; border: none; text-align: right; width: 45px; font-size: 14px; outline: none; }        
        
        .mission-item { background: #000; border: 1px solid #222; padding: 12px; margin-bottom: 10px; border-left: 3px solid var(--a); }        
        .m-done { border-color: var(--shadow); opacity: 0.3; filter: grayscale(1); pointer-events: none; }        
        .m-title { font-size: 9px; color: var(--a); font-weight: bold; display: block; margin-bottom: 4px; text-transform: uppercase; }        
        .m-desc { font-size: 12px; line-height: 1.3; display: block; margin-bottom: 10px; }        
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 999; display: flex; align-items: center; justify-content: center; padding: 20px; }        
        .card { background: #080808; border: 1px solid var(--a); padding: 25px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; }        
                
        button { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--a); color: var(--a); cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; transition: 0.2s; outline: none; }        
        button:active { background: var(--a); color: #000; }        
        .setup-btn { margin-top: 10px; border: 1px solid #333; color: #888; }
        .setup-btn.active { border-color: var(--a); color: var(--a); }
        .penalty-msg { color: var(--danger); font-size: 10px; margin-top: 5px; text-align: center; font-weight: bold; min-height: 12px;}

        .hidden { display: none !important; }
        input[type="text"] { width:100%; padding:12px; background:#000; color:#fff; border:1px solid #222; margin-bottom:10px; }
    </style>        
</head>        
<body>        
        
<div id="setup-box" class="overlay hidden"><div class="card" id="setup-content"></div></div>        
<div id="skill-selector" class="overlay hidden"><div class="card" id="options-container"></div></div>        
        
<div class="container">        
    <div class="panel">        
        <div class="day-counter" id="day-ui">DAY 01</div>        
        <div class="header-status">        
            <div class="avatar-container" onclick="document.getElementById('file-input').click()">
                <div id="av-view" style="color:#555; font-size:24px;">+</div>
                <input type="file" id="file-input" accept="image/*" onchange="Sys.handleImg(event)">
            </div>
            <div id="n-ui" style="letter-spacing:4px; font-weight:bold; font-size: 18px;">---</div>        
            <div id="c-ui" style="color: var(--a); font-size: 9px; margin-top: 4px; letter-spacing: 2px;">---</div>        
            <div class="lvl" id="l-ui">01</div>        
            <div id="rank-label" class="rank-ui">RANK: E</div>        
        </div>        
        <div class="xp-w"><div id="x-ui" class="xp-f"></div></div>        
        <div class="grid-2">
            <button onclick="Sys.modXP(-1)">-1 XP</button>
            <button onclick="Sys.modXP(1)">+1 XP</button>
        </div>
        <div id="penalty-log" class="penalty-msg"></div>
    </div>        
        
    <div class="panel">        
        <div style="font-size:10px; color:var(--a); margin-bottom:12px; font-weight: bold;">ACTIVE MISSIONS</div>        
        <div id="m-ui"></div>        
    </div>        
        
    <div class="panel">        
        <div style="font-size:9px; text-align:center; color:#555; margin-bottom:10px;">DNA CORE</div>        
        <div id="a-ui" class="grid-2"></div>        
    </div>        
        
    <div class="panel">        
        <div style="font-size:9px; text-align:center; color:#555; margin-bottom:10px;">SKILLS ACQUIRED</div>        
        <div class="grid-3" id="s-ui"></div>        
        <button onclick="Sys.reset()" style="border:none; color:#1a1a1a; font-size:9px; margin-top:20px; background:none; width:100%;">[ FORMAT SYSTEM ]</button>
    </div>
</div>        
        
<script>        
    const QUESTS = { 
        FOR:["Flexões", "Carga Máxima"], VIT:["Banho Gelo", "4L Água"], INT:["Sudoku", "Code"], 
        AGI:["Corda", "Reflexo"], CAR:["Estranho", "Oratória"], SAB:["Meditar", "Gratidão"], 
        TEN:["Deep Work", "Banho Frio"], 
        ADAP:["Mudar Rota Trabalho", "Nova Técnica Escovar", "Aprender Nova Palavra", "Nova Receita"], 
        RES:["Jejum", "Sem Açúcar"], COR:["Medo", "Decisão"], INF:["Arquivos", "Atalho"], 
        MANA:["Nap", "No Screen"], VEL:["Sprint", "Digitar"], DEF:["Postura", "Esquiva"], 
        PRE:["Espelho", "Postura"], HON:["Promessa", "Erro"], SOR:["Sorteio", "Risco"], 
        EMO:["Gatilho", "Perdão"], ART:["Desenho", "Poema"], ALQ:["Receita", "Workspace"], 
        SOM:["Body Lang", "Voz"], ALMA:["Crença", "Caridade"], MAL:["Adverso", "Frio"], 
        RIT:["Ritmo", "Horário"], OSS:["Impacto", "Cálcio"], ARC:["História", "Museu"], 
        NAT:["Sol", "Planta"], PER:["Detalhe", "Cheiro"], FUR:["Explosão", "Saco"], CON:["Foco", "Puzzle"] 
    };

    const SKILL_DB = [
        {n:"Resilience", d:"Bounce back from any failure."},
        {n:"Deep Focus", d:"Absolute productivity for 90min."},
        {n:"Communication", d:"Superior influence in speech."},
        {n:"Discipline", d:"Execute tasks without motivation."},
        {n:"E. Intelligence", d:"Control of all emotional impulses."},
        {n:"Networking", d:"Access to high-level contacts."},
        {n:"Sovereignty", d:"Alpha presence in any room."},
        {n:"Stoicism", d:"Unalterable calm under pressure."}
    ];

    const Sys = {        
        db: { name: "", class: "", lvl: 1, xp: 0, attrs: [], skills: [], dayCount: 1, avatar: null, lastDate: null, dailyMissions: [], unlockedTiers: [] },        
        
        start() {        
            const s = localStorage.getItem('shadow_v34');        
            if(s) { this.db = JSON.parse(s); this.processPenalty(); this.upd(); } else { this.step(1); }        
            this.initAudio();
        },        
        
        save() { localStorage.setItem('shadow_v34', JSON.stringify(this.db)); },

        handleImg(e){
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev)=>{
                const img = new Image();
                img.onload = ()=>{
                    let size = 100;
                    let quality = 0.9;
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");
                    const compress = () => {
                        canvas.width = size;
                        canvas.height = size;
                        ctx.clearRect(0,0,size,size);
                        ctx.drawImage(img,0,0,size,size);
                        let data = canvas.toDataURL("image/jpeg",quality);
                        if(data.length > 10000){
                            if(quality > 0.2){ quality -= 0.05; }
                            else if(size > 40){ size -= 5; quality = 0.9; }
                            else{ 
                                this.db.avatar = data; 
                                this.save(); this.upd(); 
                                return; 
                            }
                            compress();
                        } else {
                            this.db.avatar = data;
                            this.save(); this.upd();
                        }
                    };
                    compress();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        },

        initAudio() {
            // Criando áudio via link externo de trilha estilo épico/dark
            const audio = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3");
            audio.loop = true;
            audio.volume = 0.2;
            // Tocar no primeiro clique na página
            document.addEventListener('click', () => { audio.play(); }, { once: true });
        },

        processPenalty() {
            const now = new Date();
            const todayStr = now.toDateString();
            if (this.db.lastDate && this.db.lastDate !== todayStr) {
                const failed = this.db.dailyMissions.filter(m => !m.done).length;
                let penaltyXP = (failed * 5);
                const lastDateObj = new Date(this.db.lastDate);
                const diffDays = Math.floor(Math.abs(now - lastDateObj) / (1000 * 60 * 60 * 24));
                if (diffDays > 1) penaltyXP += (diffDays - 1) * 5;
                if (penaltyXP > 0) {
                    this.db.xp -= penaltyXP;
                    if (this.db.xp < 0) this.db.xp = 0;
                    document.getElementById('penalty-log').innerText = `PENALTY: -${penaltyXP} XP`;
                }
                this.db.dayCount += diffDays || 1;
                this.generateMissions();
            }
            this.db.lastDate = todayStr;
            this.save();
        },

        generateMissions() {
            this.db.dailyMissions = this.db.attrs.map(a => ({
                attr: a[0], task: (QUESTS[a[0]]||["Core Task"])[Math.floor(Math.random()*(QUESTS[a[0]]||[]).length)], done: false
            }));
            this.save();
        },

        modXP(v) {        
            this.db.xp += v;        
            while(this.db.xp >= 100) { this.db.lvl++; this.db.xp -= 100; this.checkSkillUnlock(); }
            if(this.db.xp < 0) this.db.xp = 0;
            this.save(); this.upd();        
        },        
        
        completeQuest(i) {
            if(this.db.dailyMissions[i].done) return;
            const aIdx = this.db.attrs.findIndex(a => a[0] === this.db.dailyMissions[i].attr);
            if(aIdx!==-1) this.db.attrs[aIdx][1]++;
            this.db.dailyMissions[i].done = true;
            this.modXP(10);
        },

        checkSkillUnlock() {
            const tier = Math.floor(this.db.lvl / 5) * 5;
            if(tier > 0 && !this.db.unlockedTiers.includes(tier)) {
                const selection = SKILL_DB.sort(() => 0.5 - Math.random()).slice(0, 3);
                const cont = document.getElementById('options-container');
                cont.innerHTML = `<h3>SKILL SELECTION</h3>` + selection.map(s => `<div class="setup-btn active" style="padding:15px; text-align:left;" onclick="Sys.pickSkill('${s.n}', ${tier})"><strong>${s.n}</strong><br><small>${s.d}</small></div>`).join('');
                document.getElementById('skill-selector').classList.remove('hidden');
            }
        },

        pickSkill(name, tier) {
            this.db.skills.push({ n: name });
            this.db.unlockedTiers.push(tier);
            document.getElementById('skill-selector').classList.add('hidden');
            this.save(); this.upd();
        },

        upd() {        
            document.getElementById('n-ui').innerText = this.db.name || "PLAYER";        
            document.getElementById('c-ui').innerText = (this.db.class || "SOLO").toUpperCase();        
            document.getElementById('l-ui').innerText = String(this.db.lvl).padStart(2, '0');        
            document.getElementById('x-ui').style.width = this.db.xp + '%';        
            document.getElementById('day-ui').innerText = `DAY ${String(this.db.dayCount).padStart(2, '0')}`;
            if(this.db.avatar) document.getElementById('av-view').innerHTML = `<img src="${this.db.avatar}">`;
            
            const avgAttr = this.db.attrs.reduce((p, c) => p + c[1], 0) / 10;
            const rankScore = (this.db.lvl * 2) + avgAttr;
            let rank = "E";
            if(rankScore > 180) rank = "S";
            else if(rankScore > 140) rank = "A";
            else if(rankScore > 100) rank = "B";
            else if(rankScore > 70) rank = "C";
            else if(rankScore > 40) rank = "D";
            document.getElementById('rank-label').innerText = `RANK: ${rank}`;
            
            document.getElementById('m-ui').innerHTML = (this.db.dailyMissions||[]).map((m, i) => `<div class="mission-item ${m.done?'m-done':''}"> <span class="m-title">${m.attr} (+1)</span> <span class="m-desc">${m.task}</span> <button onclick="Sys.completeQuest(${i})">${m.done?'COMPLETED':'COMPLETE'}</button> </div>`).join('');        
            document.getElementById('a-ui').innerHTML = this.db.attrs.map((a, i) => `<div class="attr-card"><span>${a[0]}</span><input type="number" class="attr-v" value="${a[1]}" onchange="Sys.db.attrs[${i}][1]=parseInt(this.value);Sys.save();Sys.upd()"></div>`).join('');        
            document.getElementById('s-ui').innerHTML = (this.db.skills||[]).map(s => `<div style="border:1px solid var(--b); padding:5px; font-size:9px; text-align:center; background:var(--shadow);">${s.n}</div>`).join('');        
        },        
        
        step(s) {        
            const area = document.getElementById('setup-content');        
            document.getElementById('setup-box').classList.remove('hidden');        
            if(s===1) { area.innerHTML = `<h3>IDENTIFICATION</h3><input type="text" id="in-n" placeholder="NAME"><button onclick="Sys.db.name=document.getElementById('in-n').value;Sys.step(2)">NEXT</button>`; } 
            else if(s===2) { area.innerHTML = `<h3>ARCHETYPE</h3>` + ["Guerreiro", "Assassino", "Mago", "Suporte"].map(c => `<button class="setup-btn active" onclick="Sys.db.class='${c}';Sys.step(3)">${c.toUpperCase()}</button>`).join(''); } 
            else if(s===3) { area.innerHTML = `<h3>DNA CORE (SELECT 10)</h3><div class="grid-3" style="max-height:250px; overflow-y:auto; margin-bottom:10px;">` + Object.keys(QUESTS).map(at => `<div class="setup-btn ${Sys.db.attrs.some(a=>a[0]===at)?'active':''}" style="font-size:9px; padding:8px;" onclick="Sys.tglA('${at}')">${at}</div>`).join('') + `</div><button onclick="if(Sys.db.attrs.length===10) Sys.fin();">AWAKEN</button>`; }        
        },        
        
        tglA(at) { const i = this.db.attrs.findIndex(a => a[0]===at); if(i>-1) this.db.attrs.splice(i,1); else if(this.db.attrs.length<10) this.db.attrs.push([at, 10]); this.step(3); },        
        fin() { this.db.dayCount = 1; this.db.lastDate = new Date().toDateString(); this.save(); document.getElementById('setup-box').classList.add('hidden'); this.generateMissions(); this.upd(); },        
        reset() { if(confirm("REBOOT SYSTEM? ALL DATA WIPED.")) { localStorage.clear(); location.reload(); } }        
    };        
    document.addEventListener('DOMContentLoaded', () => Sys.start());
</script>        
</body>        
</html>
