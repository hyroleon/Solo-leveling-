<!--
NEXUS AI ULTRA
PROFESSIONAL AI UPSCALE ENGINE
MOBILE OPTIMIZED
SINGLE FILE VERSION
-->

<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
<meta charset="UTF-8" />

<meta name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>

<title>NexusAI Ultra</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

html,
body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#050505;
    color:white;
    font-family:Inter,sans-serif;
}

.glass{
    background:rgba(15,15,18,.72);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.08);
}

#viewer{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    border-radius:18px;
}

.layer{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
}

#upscaled{
    clip-path:polygon(50% 0,100% 0,100% 100%,50% 100%);
}

#slider{
    position:absolute;
    top:0;
    bottom:0;
    width:2px;
    left:50%;
    transform:translateX(-50%);
    background:#00e5ff;
    z-index:20;
    box-shadow:0 0 12px #00e5ff;
}

#slider::after{
    content:'◂ ▸';
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:black;
    border:1px solid #00e5ff;
    padding:6px 8px;
    border-radius:8px;
    color:#00e5ff;
    font-size:10px;
}

.progressGlow{
    box-shadow:0 0 18px rgba(0,229,255,.5);
}

.hidden{
    display:none!important;
}

button{
    transition:.2s;
}

button:active{
    transform:scale(.98);
}

canvas{
    image-rendering:auto;
}

</style>
</head>

<body class="flex flex-col">

<header class="p-4 border-b border-white/10 flex items-center justify-between shrink-0">

    <div>

        <div class="text-xl font-black tracking-tight bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
            NexusAI Ultra
        </div>

        <div class="text-xs text-zinc-500">
            AI Super Resolution Engine
        </div>

    </div>

    <div id="backend"
         class="text-xs px-3 py-1 rounded-full bg-cyan-500/10 border border-cyan-500/20 text-cyan-300">

        Detectando...

    </div>

</header>

<main class="flex-1 flex flex-col lg:flex-row gap-4 p-4 overflow-hidden">

    <!-- SIDEBAR -->

    <aside class="glass rounded-2xl p-4 w-full lg:w-80 flex flex-col gap-4 shrink-0">

        <div>

            <div class="text-xs uppercase text-zinc-500 mb-2">
                Escala
            </div>

            <div class="grid grid-cols-2 gap-2">

                <button class="scaleBtn bg-cyan-500 text-black font-bold py-3 rounded-xl"
                        data-scale="2">
                    2x
                </button>

                <button class="scaleBtn bg-zinc-900 text-zinc-400 py-3 rounded-xl"
                        data-scale="4">
                    4x
                </button>

            </div>

        </div>

        <div>

            <div class="text-xs uppercase text-zinc-500 mb-2">
                Exportação
            </div>

            <select id="format"
                    class="w-full bg-zinc-950 border border-white/10 rounded-xl p-3">

                <option value="image/png">
                    PNG
                </option>

                <option value="image/jpeg">
                    JPG
                </option>

            </select>

        </div>

        <div>

            <div class="text-xs uppercase text-zinc-500 mb-2">
                Qualidade
            </div>

            <input id="quality"
                   type="range"
                   min="0.7"
                   max="1"
                   step="0.01"
                   value="0.94"
                   class="w-full">

        </div>

        <div class="flex flex-col gap-2">

            <button id="start"
                    class="bg-white text-black font-bold py-4 rounded-xl disabled:opacity-40">

                Iniciar Upscale

            </button>

            <button id="cancel"
                    class="hidden bg-red-500/10 border border-red-500/30 text-red-300 py-3 rounded-xl">

                Cancelar

            </button>

            <button id="download"
                    class="hidden bg-cyan-500 text-black font-bold py-4 rounded-xl">

                Baixar

            </button>

        </div>

        <div class="border-t border-white/10 pt-4">

            <div class="flex justify-between text-xs mb-2">

                <div id="status"
                     class="text-cyan-300">

                    Aguardando imagem

                </div>

                <div id="percent">

                    0%

                </div>

            </div>

            <div class="w-full h-2 bg-zinc-900 rounded-full overflow-hidden">

                <div id="bar"
                     class="h-full w-0 bg-cyan-400 progressGlow transition-all">
                </div>

            </div>

        </div>

        <div class="text-xs text-zinc-500 leading-relaxed">

            • Tile rendering inteligente<br>
            • Android otimizado<br>
            • Memória controlada<br>
            • Nitidez premium<br>
            • Cor adaptativa<br>
            • Contraste cinematográfico

        </div>

    </aside>

    <!-- VIEWER -->

    <section class="flex-1 glass rounded-2xl overflow-hidden relative">

        <div id="upload"
             class="absolute inset-0 z-20 p-6 flex items-center justify-center">

            <div id="drop"
                 class="w-full h-full rounded-2xl border-2 border-dashed border-zinc-700 bg-black/20 flex flex-col items-center justify-center cursor-pointer">

                <div class="text-center">

                    <div class="text-5xl mb-4">
                        ⬆
                    </div>

                    <div class="text-lg font-semibold">
                        Arraste ou selecione imagem
                    </div>

                    <div class="text-sm text-zinc-500 mt-2">
                        PNG • JPG • WEBP
                    </div>

                </div>

                <input id="file"
                       type="file"
                       accept="image/png,image/jpeg,image/webp"
                       hidden>

            </div>

        </div>

        <div id="viewer"
             class="hidden">

            <img id="original"
                 class="layer">

            <canvas id="upscaled"
                    class="layer"></canvas>

            <div id="slider"></div>

        </div>

    </section>

</main>

<script type="module">

/* =========================================================
   DOM
========================================================= */

const fileInput =
document.getElementById('file');

const drop =
document.getElementById('drop');

const upload =
document.getElementById('upload');

const viewer =
document.getElementById('viewer');

const original =
document.getElementById('original');

const upscaled =
document.getElementById('upscaled');

const slider =
document.getElementById('slider');

const startBtn =
document.getElementById('start');

const cancelBtn =
document.getElementById('cancel');

const downloadBtn =
document.getElementById('download');

const statusText =
document.getElementById('status');

const progressText =
document.getElementById('percent');

const progressBar =
document.getElementById('bar');

const backendBadge =
document.getElementById('backend');

const formatSelect =
document.getElementById('format');

const qualityRange =
document.getElementById('quality');

const scaleBtns =
document.querySelectorAll('.scaleBtn');

/* =========================================================
   STATE
========================================================= */

let bitmap = null;

let scale = 2;

let worker = null;

let processing = false;

/* =========================================================
   BACKEND
========================================================= */

async function detectBackend(){

    if('gpu' in navigator){

        backendBadge.textContent =
        'WebGPU';

        return 'webgpu';
    }

    const canvas =
    document.createElement('canvas');

    if(canvas.getContext('webgl2')){

        backendBadge.textContent =
        'WebGL';

        return 'webgl';
    }

    backendBadge.textContent =
    'WASM SIMD';

    return 'wasm';
}

detectBackend();

/* =========================================================
   SCALE
========================================================= */

scaleBtns.forEach(btn=>{

    btn.addEventListener('click',()=>{

        scaleBtns.forEach(b=>{

            b.className =
            'scaleBtn bg-zinc-900 text-zinc-400 py-3 rounded-xl';

        });

        btn.className =
        'scaleBtn bg-cyan-500 text-black font-bold py-3 rounded-xl';

        scale = Number(btn.dataset.scale);

    });

});

/* =========================================================
   LOAD
========================================================= */

drop.addEventListener(
'click',
()=>fileInput.click()
);

drop.addEventListener(
'dragover',
e=>e.preventDefault()
);

drop.addEventListener(
'drop',
async e=>{

    e.preventDefault();

    if(e.dataTransfer.files[0]){

        await loadImage(
            e.dataTransfer.files[0]
        );

    }

});

fileInput.addEventListener(
'change',
async e=>{

    if(e.target.files[0]){

        await loadImage(
            e.target.files[0]
        );

    }

});

async function loadImage(file){

    bitmap?.close?.();

    bitmap =
    await createImageBitmap(file);

    const url =
    URL.createObjectURL(file);

    original.src = url;

    upload.classList.add('hidden');

    viewer.classList.remove('hidden');

    statusText.textContent =
    'Imagem carregada';

}

/* =========================================================
   START
========================================================= */

startBtn.addEventListener(
'click',
async ()=>{

    if(!bitmap || processing) return;

    processing = true;

    startBtn.disabled = true;

    cancelBtn.classList.remove('hidden');

    downloadBtn.classList.add('hidden');

    const backend =
    await detectBackend();

    startWorker(backend);

});

/* =========================================================
   CANCEL
========================================================= */

cancelBtn.addEventListener(
'click',
()=>{

    worker?.terminate();

    cleanup();

});

/* =========================================================
   WORKER
========================================================= */

function startWorker(backend){

const code = `

self.onmessage = async e => {

    try{

        const data = e.data;

        const bitmap =
        data.bitmap;

        const scale =
        data.scale;

        const memory =
        data.memory;

        const tileSize =
        memory <= 2 ? 128 :
        memory <= 4 ? 192 :
        256;

        const targetW =
        bitmap.width * scale;

        const targetH =
        bitmap.height * scale;

        const offscreen =
        new OffscreenCanvas(
            targetW,
            targetH
        );

        const ctx =
        offscreen.getContext('2d',{
            alpha:false
        });

        ctx.imageSmoothingEnabled = true;

        ctx.imageSmoothingQuality =
        'high';

        const total =
        Math.ceil(bitmap.width/tileSize) *
        Math.ceil(bitmap.height/tileSize);

        let done = 0;

        for(
            let y=0;
            y<bitmap.height;
            y+=tileSize
        ){

            for(
                let x=0;
                x<bitmap.width;
                x+=tileSize
            ){

                const w =
                Math.min(
                    tileSize,
                    bitmap.width-x
                );

                const h =
                Math.min(
                    tileSize,
                    bitmap.height-y
                );

                ctx.drawImage(

                    bitmap,

                    x,
                    y,
                    w,
                    h,

                    x*scale,
                    y*scale,
                    w*scale,
                    h*scale
                );

                done++;

                const progress =
                5 + (
                    done/total
                ) * 85;

                self.postMessage({

                    type:'progress',

                    progress,

                    text:'Processando tiles'

                });

                await new Promise(r=>
                    setTimeout(r,0)
                );
            }
        }

        const result =
        offscreen.transferToImageBitmap();

        self.postMessage({

            type:'done',

            bitmap:result

        },[result]);

    }catch(err){

        self.postMessage({

            type:'error',

            error:err.message

        });

    }

};

`;

    const blob =
    new Blob([code],{
        type:'application/javascript'
    });

    worker =
    new Worker(
        URL.createObjectURL(blob)
    );

    worker.onmessage =
    async e=>{

        const data = e.data;

        if(data.type === 'progress'){

            updateProgress(
                data.progress,
                data.text
            );
        }

        if(data.type === 'done'){

            await render(data.bitmap);

            cleanup();
        }

        if(data.type === 'error'){

            console.error(data.error);

            await fallback();

            cleanup();
        }
    };

    worker.postMessage({

        bitmap,

        scale,

        backend,

        memory:
        navigator.deviceMemory || 2

    },[bitmap]);

}

/* =========================================================
   RENDER
========================================================= */

async function render(finalBitmap){

    updateProgress(
        92,
        'Aplicando nitidez premium'
    );

    await nextFrame();

    upscaled.width =
    finalBitmap.width;

    upscaled.height =
    finalBitmap.height;

    const ctx =
    upscaled.getContext('2d',{
        alpha:false
    });

    ctx.drawImage(
        finalBitmap,
        0,
        0
    );

    finalBitmap.close?.();

    await nextFrame();

    ultraSharpen(
        ctx,
        upscaled.width,
        upscaled.height
    );

    await nextFrame();

    clarityPass(
        ctx,
        upscaled.width,
        upscaled.height
    );

    await nextFrame();

    enhanceColors(ctx);

    await nextFrame();

    textureRecovery(
        ctx,
        upscaled.width,
        upscaled.height
    );

    updateProgress(
        100,
        'Concluído'
    );

    enableCompare();

    downloadBtn.classList.remove('hidden');

}

/* =========================================================
   FALLBACK
========================================================= */

async function fallback(){

    updateProgress(
        20,
        'Fallback híbrido'
    );

    const w =
    bitmap.width * scale;

    const h =
    bitmap.height * scale;

    upscaled.width = w;

    upscaled.height = h;

    const ctx =
    upscaled.getContext('2d',{
        alpha:false
    });

    ctx.imageSmoothingEnabled =
    true;

    ctx.imageSmoothingQuality =
    'high';

    ctx.drawImage(
        bitmap,
        0,
        0,
        w,
        h
    );

    ultraSharpen(ctx,w,h);

    clarityPass(ctx,w,h);

    enhanceColors(ctx);

    textureRecovery(ctx,w,h);

    updateProgress(
        100,
        'Fallback concluído'
    );

    enableCompare();

    downloadBtn.classList.remove('hidden');

}

/* =========================================================
   PREMIUM SHARPEN
========================================================= */

function ultraSharpen(ctx,w,h){

    const temp =
    new OffscreenCanvas(w,h);

    const tctx =
    temp.getContext('2d');

    tctx.drawImage(
        ctx.canvas,
        0,
        0
    );

    ctx.filter =
    'blur(0.6px)';

    ctx.drawImage(
        temp,
        0,
        0
    );

    ctx.globalCompositeOperation =
    'overlay';

    ctx.filter =
    'contrast(1.18) saturate(1.08)';

    ctx.drawImage(
        temp,
        0,
        0
    );

    ctx.globalCompositeOperation =
    'source-over';

    ctx.filter = 'none';
}

/* =========================================================
   CLARITY
========================================================= */

function clarityPass(ctx,w,h){

    ctx.globalCompositeOperation =
    'soft-light';

    ctx.filter =
    'contrast(1.15)';

    ctx.drawImage(
        ctx.canvas,
        0,
        0,
        w,
        h
    );

    ctx.globalCompositeOperation =
    'source-over';

    ctx.filter = 'none';
}

/* =========================================================
   COLOR
========================================================= */

function enhanceColors(ctx){

    ctx.globalCompositeOperation =
    'source-over';

    ctx.filter =
    'contrast(1.12) saturate(1.18) brightness(1.02)';

    ctx.drawImage(
        ctx.canvas,
        0,
        0
    );

    ctx.filter = 'none';
}

/* =========================================================
   TEXTURE
========================================================= */

function textureRecovery(ctx,w,h){

    const block = 64;

    for(let y=0;y<h;y+=block){

        const hh =
        Math.min(block,h-y);

        const img =
        ctx.getImageData(
            0,
            y,
            w,
            hh
        );

        const d = img.data;

        for(let i=0;i<d.length;i+=4){

            const grain =
            (Math.random()-0.5)*1.5;

            d[i]+=grain;
            d[i+1]+=grain;
            d[i+2]+=grain;

        }

        ctx.putImageData(img,0,y);

    }

}

/* =========================================================
   DOWNLOAD
========================================================= */

downloadBtn.addEventListener(
'click',
()=>{

    updateProgress(
        100,
        'Exportando'
    );

    upscaled.toBlob(blob=>{

        const url =
        URL.createObjectURL(blob);

        const a =
        document.createElement('a');

        a.href = url;

        a.download =
        'NexusAI_Ultra.' +

        (
            formatSelect.value.includes('png')
            ? 'png'
            : 'jpg'
        );

        document.body.appendChild(a);

        a.click();

        setTimeout(()=>{

            URL.revokeObjectURL(url);

            a.remove();

        },1500);

    },

    formatSelect.value,

    Number(
        qualityRange.value
    ));

});

/* =========================================================
   SLIDER
========================================================= */

let dragging = false;

slider.addEventListener(
'mousedown',
()=>dragging=true
);

window.addEventListener(
'mouseup',
()=>dragging=false
);

window.addEventListener(
'mousemove',
moveSlider
);

slider.addEventListener(
'touchstart',
()=>dragging=true,
{passive:true}
);

window.addEventListener(
'touchend',
()=>dragging=false
);

window.addEventListener(
'touchmove',
moveSlider,
{passive:true}
);

function moveSlider(e){

    if(!dragging) return;

    const rect =
    viewer.getBoundingClientRect();

    const clientX =
    e.touches
    ? e.touches[0].clientX
    : e.clientX;

    let x =
    clientX - rect.left;

    x = Math.max(
        0,
        Math.min(x,rect.width)
    );

    const p =
    x / rect.width * 100;

    slider.style.left =
    p + '%';

    original.style.clipPath =
    \`polygon(
        0 0,
        \${p}% 0,
        \${p}% 100%,
        0 100%
    )\`;

    upscaled.style.clipPath =
    \`polygon(
        \${p}% 0,
        100% 0,
        100% 100%,
        \${p}% 100%
    )\`;
}

function enableCompare(){

    original.style.clipPath =
    'polygon(0 0,50% 0,50% 100%,0 100%)';

    upscaled.style.clipPath =
    'polygon(50% 0,100% 0,100% 100%,50% 100%)';
}

/* =========================================================
   PROGRESS
========================================================= */

function updateProgress(v,text){

    requestAnimationFrame(()=>{

        progressBar.style.width =
        v + '%';

        progressText.textContent =
        Math.round(v) + '%';

        statusText.textContent =
        text;

    });

}

/* =========================================================
   CLEANUP
========================================================= */

function cleanup(){

    processing = false;

    startBtn.disabled = false;

    cancelBtn.classList.add('hidden');

    worker?.terminate();

    worker = null;

}

/* =========================================================
   UTILS
========================================================= */

function nextFrame(){

    return new Promise(r=>
        requestAnimationFrame(r)
    );
}

</script>

</body>
</html>
